<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>small-health-gpt</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.14);
      --text: rgba(255,255,255,0.9);
      --muted: rgba(255,255,255,0.34);
      --soft: rgba(255,255,255,0.62);
      --orange: #ff7a2b;
      --mono: "SFMono-Regular", "JetBrains Mono", "IBM Plex Mono", Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: white;
      font-family: var(--sans);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 28%),
        radial-gradient(rgba(255,255,255,0.12) 0.7px, transparent 0.7px);
      background-size: auto, 7px 7px;
      opacity: 0.42;
    }

    .page {
      min-height: 100vh;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.015) 0 1px,
          transparent 1px 3px
        );
      opacity: 0.4;
      mix-blend-mode: screen;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      position: relative;
      z-index: 1;
    }

    .brand {
      font-size: 20px;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.9);
    }

    .meta {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--orange);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .hero {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin-top: 10px;
    }

    .title {
      margin: 0;
      font-weight: 400;
      font-size: clamp(58px, 10vw, 128px);
      line-height: 0.92;
      letter-spacing: -0.08em;
      color: var(--text);
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 720px;
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: -0.03em;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
      z-index: 1;
      width: min(840px, 100%);
      margin: 48px 0 32px;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .question-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      padding: 16px 18px;
      resize: vertical;
      outline: none;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.55;
      backdrop-filter: blur(8px);
    }

    textarea:focus {
      border-color: rgba(255,122,43,0.8);
    }

    button {
      min-width: 110px;
      border: 1px solid rgba(255,122,43,0.95);
      background: rgba(255,122,43,0.95);
      color: #090909;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 18px;
      cursor: pointer;
    }

    button:hover {
      background: #fff;
      border-color: #fff;
    }

    .response {
      margin-top: 14px;
      min-height: 150px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      padding: 18px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      color: var(--soft);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .response strong {
      color: white;
      font-weight: 500;
    }

    .footer {
      position: relative;
      z-index: 1;
      max-width: 760px;
      font-size: 17px;
      line-height: 1.45;
      letter-spacing: -0.04em;
      color: var(--muted);
    }

    .footer b {
      color: rgba(255,255,255,0.9);
      font-weight: 400;
    }

    @media (max-width: 720px) {
      .page {
        padding: 20px;
      }

      .question-box {
        grid-template-columns: 1fr;
      }

      button {
        height: 52px;
      }

      .title {
        font-size: clamp(50px, 16vw, 88px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div>
      <header class="topbar">
        <div class="brand">small-health.gpt</div>
        <div class="meta">local medical qa</div>
      </header>

      <section class="hero">
        <h1 class="title">small<br>health gpt</h1>
        <p class="subtitle">
          Ask your local health model a question through a minimal interface.
        </p>
      </section>

      <section class="input-wrap">
        <label class="label" for="prompt">Question Input</label>

        <form id="askForm">
          <div class="question-box">
            <textarea id="prompt" spellcheck="false" placeholder="Question: What is diabetes?
Answer:"></textarea>
            <button type="submit">Ask</button>
          </div>
        </form>

        <div class="response" id="response"><strong>Response:</strong> waiting for a question...</div>
      </section>
    </div>

    <p class="footer">
      a simple local interface for <b>small-health-gpt</b> · checkpoint-based inference
    </p>
  </main>

  <script>
    const form = document.getElementById("askForm");
    const promptBox = document.getElementById("prompt");
    const responseBox = document.getElementById("response");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const prompt = promptBox.value.trim();
      if (!prompt) return;

      responseBox.innerHTML = "<strong>Response:</strong> generating...";

      try {
        const res = await fetch("http://127.0.0.1:8000/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt,
            max_new_tokens: 160
          })
        });

        if (!res.ok) throw new Error("Request failed");

        const data = await res.json();
        const answer = data.response || data.answer || "No response returned.";

        responseBox.innerHTML = `<strong>Response:</strong>\n${escapeHtml(answer)}`;
      } catch (error) {
        responseBox.innerHTML = "<strong>Response:</strong> could not connect to the local model server.";
      }
    });

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }
  </script>
</body>
</html>
